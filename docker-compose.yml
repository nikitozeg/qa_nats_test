services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d trading"]
      interval: 2s
      timeout: 2s
      retries: 10

  order-service:
    image: ghcr.io/fundingpips/interview-qa-automation-order-service:1.0
    restart: on-failure
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://testuser:testpass@postgres:5432/trading
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  trade-service:
    image: ghcr.io/fundingpips/interview-qa-automation-trade-service:1.0
    restart: on-failure
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://testuser:testpass@postgres:5432/trading
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
